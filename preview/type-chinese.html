<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type · 繁體中文</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: var(--font-text); color: var(--fg-2); }
  .card-frame { box-sizing: border-box; padding: 24px; min-height: 240px; }
  .row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .label { font: 600 11px/1 var(--font-text); letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); }
  .hex   { font: 500 12px/1 var(--font-mono, ui-monospace); color: var(--fg-3); }
  .name  { font: 600 13px/1.2 var(--font-text); color: var(--fg-1); }
  .desc  { font: 400 13px/1.4 var(--font-text); color: var(--fg-3); }
  
</style>
</head>
<body><div class="card-frame">
    <div class="col" style="gap:8px">
      <div style="font:700 40px/1.1 var(--font-han-display);letter-spacing:0;color:var(--fg-1)">為你而轉的冰島旅程</div>
      <div style="font:500 24px/1.3 var(--font-han-display);color:var(--fg-1)">行程規劃 · 在地嚮導 · 無縫結帳</div>
      <div style="font:400 16px/1.65 var(--font-han-display);color:var(--fg-2)">一次規劃，多家供應商無縫整合。從黃金圈到南岸冰川，800+ 在地嚮導任你挑選。</div>
      <div class="desc" style="margin-top:4px">Noto Sans TC · 700 / 500 / 400 · full-width punctuation 「，。」</div>
    </div></div></body>
</html>
