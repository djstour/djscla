<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Components · Itinerary Day</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@0.474.0/dist/umd/lucide.js"></script>
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: var(--font-text); color: var(--fg-2); }
  .card-frame { box-sizing: border-box; padding: 20px; min-height: 240px; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; gap: 6px; }
  .label { font: 600 11px/1 var(--font-text); letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 6px; }
  .desc  { font: 400 12px/1.4 var(--font-text); color: var(--fg-3); }

  /* Buttons */
  .btn { font-family: var(--font-text); font-weight: 600; font-size: 14px; line-height: 1; cursor: pointer; border: 0; display: inline-flex; align-items: center; gap: 8px; transition: transform var(--dur-fast) var(--ease-out), box-shadow var(--dur-fast) var(--ease-out), filter var(--dur-fast) var(--ease-out); }
  .btn--md { height: 44px; padding: 0 20px; border-radius: 999px; }
  .btn--sm { height: 36px; padding: 0 16px; border-radius: 999px; font-size: 13px; }
  .btn--lg { height: 52px; padding: 0 26px; border-radius: 999px; font-size: 15px; }
  .btn--primary { background: var(--gradient-aurora); color: #062F2A; box-shadow: var(--shadow-glow-aurora); }
  .btn--primary:hover { filter: brightness(1.06); }
  .btn--sun { background: var(--gradient-sun); color: #fff; box-shadow: var(--shadow-glow-sun); }
  .btn--coral { background: var(--coral); color: #fff; box-shadow: 0 8px 22px rgba(255,90,106,0.35); }
  .btn--glass { background: var(--glass-strong); color: var(--fg-1); backdrop-filter: blur(20px); box-shadow: var(--shadow-2), var(--ring-glass); }
  .btn--ghost { background: transparent; color: var(--fg-1); box-shadow: inset 0 0 0 1px var(--base-300); }
  .btn--ghost:hover { background: var(--base-100); }
  .btn:active { transform: scale(0.98); }
  .btn [data-lucide] { width: 16px; height: 16px; }
</style>
</head>
<body><div class="card-frame">
    <div class="col" style="gap:12px;max-width:640px">
      
        <div class="row" style="gap:14px;background:#fff;border-radius:18px;padding:14px 18px;box-shadow:var(--shadow-2);position:relative;overflow:hidden">
          <div style="position:absolute;left:0;top:0;bottom:0;width:4px;background:#2EFFB8"></div>
          <div style="width:56px;height:56px;border-radius:14px;background:#2EFFB822;display:flex;flex-direction:column;align-items:center;justify-content:center;flex:none">
            <span style="font:500 10px/1 var(--font-text);letter-spacing:0.1em;color:var(--fg-3);text-transform:uppercase">Day</span>
            <span style="font:700 22px/1 var(--font-display);color:var(--fg-1);letter-spacing:-0.02em">3</span>
          </div>
          <div class="col" style="flex:1;gap:4px">
            <div style="font:600 16px/1.3 var(--font-display);color:var(--fg-1)">Vík → Höfn</div>
            <div style="font:400 14px/1.4 var(--font-text);color:var(--fg-2)">Glacier lagoon · Diamond beach</div>
            <div class="row" style="gap:10px;color:var(--fg-3);font:500 12px/1 var(--font-text)">
              <span class="row" style="gap:4px"><i data-lucide="clock" style="width:12px;height:12px"></i>7 hr drive · 2 stops</span>
            </div>
          </div>
          <i data-lucide="chevron-right" style="width:20px;height:20px;color:var(--fg-3)"></i>
        </div>
      
        <div class="row" style="gap:14px;background:#fff;border-radius:18px;padding:14px 18px;box-shadow:var(--shadow-2);position:relative;overflow:hidden">
          <div style="position:absolute;left:0;top:0;bottom:0;width:4px;background:#FF7A2E"></div>
          <div style="width:56px;height:56px;border-radius:14px;background:#FF7A2E22;display:flex;flex-direction:column;align-items:center;justify-content:center;flex:none">
            <span style="font:500 10px/1 var(--font-text);letter-spacing:0.1em;color:var(--fg-3);text-transform:uppercase">Day</span>
            <span style="font:700 22px/1 var(--font-display);color:var(--fg-1);letter-spacing:-0.02em">4</span>
          </div>
          <div class="col" style="flex:1;gap:4px">
            <div style="font:600 16px/1.3 var(--font-display);color:var(--fg-1)">Höfn — rest day</div>
            <div style="font:400 14px/1.4 var(--font-text);color:var(--fg-2)">Hot spring + lobster dinner</div>
            <div class="row" style="gap:10px;color:var(--fg-3);font:500 12px/1 var(--font-text)">
              <span class="row" style="gap:4px"><i data-lucide="clock" style="width:12px;height:12px"></i>Flexible</span>
            </div>
          </div>
          <i data-lucide="chevron-right" style="width:20px;height:20px;color:var(--fg-3)"></i>
        </div>
      
    </div></div><script>lucide.createIcons();</script></body>
</html>
