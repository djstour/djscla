<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Color · Midnight Sun Gradient</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: var(--font-text); color: var(--fg-2); }
  .card-frame { box-sizing: border-box; padding: 24px; min-height: 200px; }
  .row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .label { font: 600 11px/1 var(--font-text); letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); }
  .hex   { font: 500 12px/1 var(--font-mono, ui-monospace); color: var(--fg-3); }
  .name  { font: 600 13px/1.2 var(--font-text); color: var(--fg-1); }
  .desc  { font: 400 13px/1.4 var(--font-text); color: var(--fg-3); }
  
</style>
</head>
<body><div class="card-frame">
    <div style="display:grid;grid-template-columns:1fr;gap:14px">
      <div style="height:120px;border-radius:20px;background:var(--gradient-sun);box-shadow:var(--shadow-glow-sun);position:relative;overflow:hidden">
        <span style="position:absolute;left:18px;bottom:14px;color:#fff;font:700 22px/1 var(--font-display);letter-spacing:-0.02em">Midnight Sun</span>
        <span style="position:absolute;right:18px;bottom:14px;color:rgba(255,255,255,0.9);font:500 11px/1 var(--font-text);letter-spacing:0.12em">#6B2FE6 → #FF7A2E</span>
      </div>
      <div class="row" style="gap:10px">
        
          <div class="col" style="flex:1">
            <div style="height:32px;border-radius:8px;background:#6B2FE6;box-shadow:var(--shadow-1)"></div>
            <div class="hex">#6B2FE6</div>
          </div>
          <div class="col" style="flex:1">
            <div style="height:32px;border-radius:8px;background:#B331E2;box-shadow:var(--shadow-1)"></div>
            <div class="hex">#B331E2</div>
          </div>
          <div class="col" style="flex:1">
            <div style="height:32px;border-radius:8px;background:#FF7A2E;box-shadow:var(--shadow-1)"></div>
            <div class="hex">#FF7A2E</div>
          </div>
          <div class="col" style="flex:1">
            <div style="height:32px;border-radius:8px;background:#FFB347;box-shadow:var(--shadow-1)"></div>
            <div class="hex">#FFB347</div>
          </div>
      </div>
    </div></div></body>
</html>
