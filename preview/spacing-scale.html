<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing · Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: var(--font-text); color: var(--fg-2); }
  .card-frame { box-sizing: border-box; padding: 24px; min-height: 200px; }
  .row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .label { font: 600 11px/1 var(--font-text); letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); }
  .hex   { font: 500 12px/1 var(--font-mono, ui-monospace); color: var(--fg-3); }
  .name  { font: 600 13px/1.2 var(--font-text); color: var(--fg-1); }
  .desc  { font: 400 13px/1.4 var(--font-text); color: var(--fg-3); }
  
</style>
</head>
<body><div class="card-frame">
    <div class="col" style="gap:10px">
      
        <div class="row" style="gap:14px;align-items:center">
          <div class="name" style="width:60px">--space-1</div>
          <div style="height:10px;width:8px;background:var(--gradient-aurora);border-radius:999px"></div>
          <div class="hex">4px</div>
        </div>
      
        <div class="row" style="gap:14px;align-items:center">
          <div class="name" style="width:60px">--space-2</div>
          <div style="height:10px;width:16px;background:var(--gradient-aurora);border-radius:999px"></div>
          <div class="hex">8px</div>
        </div>
      
        <div class="row" style="gap:14px;align-items:center">
          <div class="name" style="width:60px">--space-3</div>
          <div style="height:10px;width:24px;background:var(--gradient-aurora);border-radius:999px"></div>
          <div class="hex">12px</div>
        </div>
      
        <div class="row" style="gap:14px;align-items:center">
          <div class="name" style="width:60px">--space-4</div>
          <div style="height:10px;width:32px;background:var(--gradient-aurora);border-radius:999px"></div>
          <div class="hex">16px</div>
        </div>
      
        <div class="row" style="gap:14px;align-items:center">
          <div class="name" style="width:60px">--space-5</div>
          <div style="height:10px;width:40px;background:var(--gradient-aurora);border-radius:999px"></div>
          <div class="hex">20px</div>
        </div>
      
        <div class="row" style="gap:14px;align-items:center">
          <div class="name" style="width:60px">--space-6</div>
          <div style="height:10px;width:48px;background:var(--gradient-aurora);border-radius:999px"></div>
          <div class="hex">24px</div>
        </div>
      
        <div class="row" style="gap:14px;align-items:center">
          <div class="name" style="width:60px">--space-8</div>
          <div style="height:10px;width:64px;background:var(--gradient-aurora);border-radius:999px"></div>
          <div class="hex">32px</div>
        </div>
      
        <div class="row" style="gap:14px;align-items:center">
          <div class="name" style="width:60px">--space-10</div>
          <div style="height:10px;width:80px;background:var(--gradient-aurora);border-radius:999px"></div>
          <div class="hex">40px</div>
        </div>
      
        <div class="row" style="gap:14px;align-items:center">
          <div class="name" style="width:60px">--space-12</div>
          <div style="height:10px;width:96px;background:var(--gradient-aurora);border-radius:999px"></div>
          <div class="hex">48px</div>
        </div>
      
        <div class="row" style="gap:14px;align-items:center">
          <div class="name" style="width:60px">--space-16</div>
          <div style="height:10px;width:128px;background:var(--gradient-aurora);border-radius:999px"></div>
          <div class="hex">64px</div>
        </div>
      
        <div class="row" style="gap:14px;align-items:center">
          <div class="name" style="width:60px">--space-20</div>
          <div style="height:10px;width:160px;background:var(--gradient-aurora);border-radius:999px"></div>
          <div class="hex">80px</div>
        </div>
      
        <div class="row" style="gap:14px;align-items:center">
          <div class="name" style="width:60px">--space-24</div>
          <div style="height:10px;width:192px;background:var(--gradient-aurora);border-radius:999px"></div>
          <div class="hex">96px</div>
        </div>
      
    </div></div></body>
</html>
