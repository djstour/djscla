<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Components · Guide Credentials</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@0.474.0/dist/umd/lucide.js"></script>
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: var(--font-text); color: var(--fg-2); }
  .card-frame { box-sizing: border-box; padding: 20px; min-height: 180px; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; gap: 6px; }
  .label { font: 600 11px/1 var(--font-text); letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 6px; }
  .desc  { font: 400 12px/1.4 var(--font-text); color: var(--fg-3); }

  /* Buttons */
  .btn { font-family: var(--font-text); font-weight: 600; font-size: 14px; line-height: 1; cursor: pointer; border: 0; display: inline-flex; align-items: center; gap: 8px; transition: transform var(--dur-fast) var(--ease-out), box-shadow var(--dur-fast) var(--ease-out), filter var(--dur-fast) var(--ease-out); }
  .btn--md { height: 44px; padding: 0 20px; border-radius: 999px; }
  .btn--sm { height: 36px; padding: 0 16px; border-radius: 999px; font-size: 13px; }
  .btn--lg { height: 52px; padding: 0 26px; border-radius: 999px; font-size: 15px; }
  .btn--primary { background: var(--gradient-aurora); color: #062F2A; box-shadow: var(--shadow-glow-aurora); }
  .btn--primary:hover { filter: brightness(1.06); }
  .btn--sun { background: var(--gradient-sun); color: #fff; box-shadow: var(--shadow-glow-sun); }
  .btn--coral { background: var(--coral); color: #fff; box-shadow: 0 8px 22px rgba(255,90,106,0.35); }
  .btn--glass { background: var(--glass-strong); color: var(--fg-1); backdrop-filter: blur(20px); box-shadow: var(--shadow-2), var(--ring-glass); }
  .btn--ghost { background: transparent; color: var(--fg-1); box-shadow: inset 0 0 0 1px var(--base-300); }
  .btn--ghost:hover { background: var(--base-100); }
  .btn:active { transform: scale(0.98); }
  .btn [data-lucide] { width: 16px; height: 16px; }
</style>
</head>
<body><div class="card-frame">
    <div class="row" style="gap:20px;align-items:center">
      
        <div class="row" style="gap:12px">
          <div style="width:52px;height:52px;border-radius:999px;background:linear-gradient(135deg,#2EFFB8,#00D5FF);display:flex;align-items:center;justify-content:center;color:#fff;font:700 18px/1 var(--font-display);box-shadow:var(--shadow-2),inset 0 0 0 2px #fff"></div>
          <div class="col" style="gap:2px">
            <div style="font:600 14px/1.2 var(--font-display);color:var(--fg-1)">Eliza H.</div>
            <div style="font:400 12px/1.3 var(--font-text);color:var(--fg-3)">Self-drive 南岸 · 8 yr</div>
            <div class="row" style="gap:4px;margin-top:2px">
              <i data-lucide="star" style="width:12px;height:12px;color:#FFB347"></i>
              <span style="font:600 12px/1 var(--font-text);color:var(--fg-2)">4.9</span>
              <span class="desc">· 312 trips</span>
            </div>
          </div>
        </div>
      
        <div class="row" style="gap:12px">
          <div style="width:52px;height:52px;border-radius:999px;background:linear-gradient(135deg,#6B2FE6,#FF7A2E);display:flex;align-items:center;justify-content:center;color:#fff;font:700 18px/1 var(--font-display);box-shadow:var(--shadow-2),inset 0 0 0 2px #fff"></div>
          <div class="col" style="gap:2px">
            <div style="font:600 14px/1.2 var(--font-display);color:var(--fg-1)">Magnús B.</div>
            <div style="font:400 12px/1.3 var(--font-text);color:var(--fg-3)">Glacier guide · IMGA</div>
            <div class="row" style="gap:4px;margin-top:2px">
              <i data-lucide="star" style="width:12px;height:12px;color:#FFB347"></i>
              <span style="font:600 12px/1 var(--font-text);color:var(--fg-2)">4.9</span>
              <span class="desc">· 312 trips</span>
            </div>
          </div>
        </div>
      
        <div class="row" style="gap:12px">
          <div style="width:52px;height:52px;border-radius:999px;background:linear-gradient(135deg,#FF5A6A,#FFB347);display:flex;align-items:center;justify-content:center;color:#fff;font:700 18px/1 var(--font-display);box-shadow:var(--shadow-2),inset 0 0 0 2px #fff"></div>
          <div class="col" style="gap:2px">
            <div style="font:600 14px/1.2 var(--font-display);color:var(--fg-1)">Yuki C.</div>
            <div style="font:400 12px/1.3 var(--font-text);color:var(--fg-3)">中文嚮導 · 雷克雅維克</div>
            <div class="row" style="gap:4px;margin-top:2px">
              <i data-lucide="star" style="width:12px;height:12px;color:#FFB347"></i>
              <span style="font:600 12px/1 var(--font-text);color:var(--fg-2)">4.9</span>
              <span class="desc">· 312 trips</span>
            </div>
          </div>
        </div>
      
    </div></div><script>lucide.createIcons();</script></body>
</html>
