<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Color · Glacier Mist</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: var(--font-text); color: var(--fg-2); }
  .card-frame { box-sizing: border-box; padding: 24px; min-height: 180px; }
  .row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .label { font: 600 11px/1 var(--font-text); letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); }
  .hex   { font: 500 12px/1 var(--font-mono, ui-monospace); color: var(--fg-3); }
  .name  { font: 600 13px/1.2 var(--font-text); color: var(--fg-1); }
  .desc  { font: 400 13px/1.4 var(--font-text); color: var(--fg-3); }
  
</style>
</head>
<body><div class="card-frame">
    <div style="height:120px;border-radius:20px;background:var(--gradient-mist);box-shadow:var(--shadow-2),inset 0 0 0 1px rgba(255,255,255,0.6);position:relative;overflow:hidden">
      <span style="position:absolute;left:18px;bottom:14px;color:#11151F;font:700 22px/1 var(--font-display);letter-spacing:-0.02em">Glacier Mist</span>
      <span style="position:absolute;right:18px;bottom:14px;color:#2E3647;font:500 11px/1 var(--font-text);letter-spacing:0.12em">#E8E2FF · #FFE9D6 · #DBF7FF</span>
    </div></div></body>
</html>
