<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Brand · Composition</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@0.474.0/dist/umd/lucide.js"></script>
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: var(--font-text); color: var(--fg-2); }
  .card-frame { box-sizing: border-box; padding: 20px; min-height: 280px; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; gap: 6px; }
  .label { font: 600 11px/1 var(--font-text); letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 6px; }
  .desc  { font: 400 12px/1.4 var(--font-text); color: var(--fg-3); }

  /* Buttons */
  .btn { font-family: var(--font-text); font-weight: 600; font-size: 14px; line-height: 1; cursor: pointer; border: 0; display: inline-flex; align-items: center; gap: 8px; transition: transform var(--dur-fast) var(--ease-out), box-shadow var(--dur-fast) var(--ease-out), filter var(--dur-fast) var(--ease-out); }
  .btn--md { height: 44px; padding: 0 20px; border-radius: 999px; }
  .btn--sm { height: 36px; padding: 0 16px; border-radius: 999px; font-size: 13px; }
  .btn--lg { height: 52px; padding: 0 26px; border-radius: 999px; font-size: 15px; }
  .btn--primary { background: var(--gradient-aurora); color: #062F2A; box-shadow: var(--shadow-glow-aurora); }
  .btn--primary:hover { filter: brightness(1.06); }
  .btn--sun { background: var(--gradient-sun); color: #fff; box-shadow: var(--shadow-glow-sun); }
  .btn--coral { background: var(--coral); color: #fff; box-shadow: 0 8px 22px rgba(255,90,106,0.35); }
  .btn--glass { background: var(--glass-strong); color: var(--fg-1); backdrop-filter: blur(20px); box-shadow: var(--shadow-2), var(--ring-glass); }
  .btn--ghost { background: transparent; color: var(--fg-1); box-shadow: inset 0 0 0 1px var(--base-300); }
  .btn--ghost:hover { background: var(--base-100); }
  .btn:active { transform: scale(0.98); }
  .btn [data-lucide] { width: 16px; height: 16px; }
</style>
</head>
<body><div class="card-frame">
    <div style="margin:-20px;padding:0;min-height:280px;background:radial-gradient(60% 80% at 20% 30%, rgba(46,255,184,0.85) 0%, transparent 60%),radial-gradient(55% 70% at 80% 20%, rgba(0,213,255,0.85) 0%, transparent 60%),radial-gradient(70% 90% at 60% 90%, rgba(107,47,230,0.6) 0%, transparent 60%),linear-gradient(135deg, #B5F0FF 0%, #E8E2FF 60%, #FFD3A8 100%);position:relative;overflow:hidden">
      <div style="position:absolute;inset:32px;display:flex;align-items:center;gap:24px">
        <div class="glass" style="flex:1;padding:24px 26px;display:flex;flex-direction:column;gap:10px">
          <span class="overline" style="color:var(--coral)">Limited · Mar 12 – 19</span>
          <div style="font:700 32px/1.05 var(--font-display);letter-spacing:-0.025em;color:var(--fg-1)">為你而轉的<br>冰島旅程</div>
          <div style="font:500 13px/1.5 var(--font-text);color:var(--fg-2)">800+ 在地嚮導，一次結帳。</div>
          <div style="margin-top:6px"><button class="btn btn--primary btn--sm">開始規劃 <i data-lucide="arrow-right"></i></button></div>
        </div>
        <div style="flex:1;display:grid;grid-template-columns:1fr 1fr;gap:12px;height:100%">
          <div class="glass glass--medium" style="padding:12px;display:flex;flex-direction:column;justify-content:flex-end;border-radius:18px"><div style="font:600 12px/1.2 var(--font-display);color:var(--fg-1)">South Coast</div><div class="desc">NT$ 4,280</div></div>
          <div class="glass glass--medium" style="padding:12px;display:flex;flex-direction:column;justify-content:flex-end;border-radius:18px"><div style="font:600 12px/1.2 var(--font-display);color:var(--fg-1)">Blue Lagoon</div><div class="desc">NT$ 5,600</div></div>
          <div class="glass glass--medium" style="padding:12px;display:flex;flex-direction:column;justify-content:flex-end;border-radius:18px;grid-column:span 2"><div style="font:600 12px/1.2 var(--font-display);color:var(--fg-1)">Northern Lights minibus</div><div class="desc">NT$ 3,200 · 中文嚮導</div></div>
        </div>
      </div>
    </div></div><script>lucide.createIcons();</script></body>
</html>
