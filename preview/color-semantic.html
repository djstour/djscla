<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Color · Semantic</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: var(--font-text); color: var(--fg-2); }
  .card-frame { box-sizing: border-box; padding: 24px; min-height: 170px; }
  .row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .label { font: 600 11px/1 var(--font-text); letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); }
  .hex   { font: 500 12px/1 var(--font-mono, ui-monospace); color: var(--fg-3); }
  .name  { font: 600 13px/1.2 var(--font-text); color: var(--fg-1); }
  .desc  { font: 400 13px/1.4 var(--font-text); color: var(--fg-3); }
  
</style>
</head>
<body><div class="card-frame">
    <div class="row" style="align-items:stretch">
      
        <div class="col" style="flex:1">
          <div style="height:64px;border-radius:12px;background:#16C683;display:flex;align-items:center;justify-content:center;color:#fff;font:600 13px/1 var(--font-text)">Success</div>
          <div style="height:28px;border-radius:8px;background:#D6F7E8;display:flex;align-items:center;padding-left:10px;color:#2E3647;font:600 12px/1 var(--font-text)">Success · soft</div>
          <div class="row" style="gap:6px"><div class="hex">#16C683</div><div class="desc">#D6F7E8</div></div>
        </div>
      
        <div class="col" style="flex:1">
          <div style="height:64px;border-radius:12px;background:#FFB347;display:flex;align-items:center;justify-content:center;color:#fff;font:600 13px/1 var(--font-text)">Warning</div>
          <div style="height:28px;border-radius:8px;background:#FFEBC9;display:flex;align-items:center;padding-left:10px;color:#2E3647;font:600 12px/1 var(--font-text)">Warning · soft</div>
          <div class="row" style="gap:6px"><div class="hex">#FFB347</div><div class="desc">#FFEBC9</div></div>
        </div>
      
        <div class="col" style="flex:1">
          <div style="height:64px;border-radius:12px;background:#FF4D5E;display:flex;align-items:center;justify-content:center;color:#fff;font:600 13px/1 var(--font-text)">Danger</div>
          <div style="height:28px;border-radius:8px;background:#FFD8DD;display:flex;align-items:center;padding-left:10px;color:#2E3647;font:600 12px/1 var(--font-text)">Danger · soft</div>
          <div class="row" style="gap:6px"><div class="hex">#FF4D5E</div><div class="desc">#FFD8DD</div></div>
        </div>
      
        <div class="col" style="flex:1">
          <div style="height:64px;border-radius:12px;background:#00D5FF;display:flex;align-items:center;justify-content:center;color:#fff;font:600 13px/1 var(--font-text)">Info</div>
          <div style="height:28px;border-radius:8px;background:#CFF4FF;display:flex;align-items:center;padding-left:10px;color:#2E3647;font:600 12px/1 var(--font-text)">Info · soft</div>
          <div class="row" style="gap:6px"><div class="hex">#00D5FF</div><div class="desc">#CFF4FF</div></div>
        </div>
      
    </div></div></body>
</html>
