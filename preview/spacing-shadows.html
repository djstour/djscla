<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing · Elevation</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: var(--font-text); color: var(--fg-2); }
  .card-frame { box-sizing: border-box; padding: 24px; min-height: 200px; }
  .row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .label { font: 600 11px/1 var(--font-text); letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); }
  .hex   { font: 500 12px/1 var(--font-mono, ui-monospace); color: var(--fg-3); }
  .name  { font: 600 13px/1.2 var(--font-text); color: var(--fg-1); }
  .desc  { font: 400 13px/1.4 var(--font-text); color: var(--fg-3); }
  
</style>
</head>
<body><div class="card-frame">
    <div class="row" style="gap:18px;align-items:flex-end;justify-content:space-around;padding:18px 6px 28px">
      
        <div class="col" style="align-items:center;gap:8px;flex:1">
          <div style="width:74px;height:74px;background:#fff;border-radius:14px;box-shadow:var(--shadow-1)"></div>
          <div class="name">shadow-1</div>
          <div class="hex">0 1px 2px / .06</div>
        </div>
      
        <div class="col" style="align-items:center;gap:8px;flex:1">
          <div style="width:74px;height:74px;background:#fff;border-radius:14px;box-shadow:var(--shadow-2)"></div>
          <div class="name">shadow-2</div>
          <div class="hex">0 4px 14px / .08</div>
        </div>
      
        <div class="col" style="align-items:center;gap:8px;flex:1">
          <div style="width:74px;height:74px;background:#fff;border-radius:14px;box-shadow:var(--shadow-3)"></div>
          <div class="name">shadow-3</div>
          <div class="hex">0 12px 32px / .12</div>
        </div>
      
        <div class="col" style="align-items:center;gap:8px;flex:1">
          <div style="width:74px;height:74px;background:#fff;border-radius:14px;box-shadow:var(--shadow-4)"></div>
          <div class="name">shadow-4</div>
          <div class="hex">0 24px 60px / .18</div>
        </div>
      
    </div></div></body>
</html>
