<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Color · Glass Surfaces</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: var(--font-text); color: var(--fg-2); }
  .card-frame { box-sizing: border-box; padding: 24px; min-height: 200px; }
  .row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .label { font: 600 11px/1 var(--font-text); letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); }
  .hex   { font: 500 12px/1 var(--font-mono, ui-monospace); color: var(--fg-3); }
  .name  { font: 600 13px/1.2 var(--font-text); color: var(--fg-1); }
  .desc  { font: 400 13px/1.4 var(--font-text); color: var(--fg-3); }
  
</style>
</head>
<body><div class="card-frame">
    <div style="position:relative;height:152px;border-radius:18px;background:var(--gradient-aurora);overflow:hidden;padding:14px">
      <div class="row" style="height:100%;gap:12px">
        
          <div style="flex:1;height:100%;background:rgba(255,255,255,0.72);backdrop-filter:blur(20px) saturate(1.2);-webkit-backdrop-filter:blur(20px) saturate(1.2);border-radius:14px;box-shadow:inset 0 0 0 1px rgba(255,255,255,0.45);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:#11151F;font:600 13px/1.2 var(--font-text)">
            strong
            <div style="font:500 10px/1.4 var(--font-mono);opacity:0.75;margin-top:2px">α 0.72</div>
          </div>
        
          <div style="flex:1;height:100%;background:rgba(255,255,255,0.55);backdrop-filter:blur(20px) saturate(1.2);-webkit-backdrop-filter:blur(20px) saturate(1.2);border-radius:14px;box-shadow:inset 0 0 0 1px rgba(255,255,255,0.45);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:#11151F;font:600 13px/1.2 var(--font-text)">
            medium
            <div style="font:500 10px/1.4 var(--font-mono);opacity:0.75;margin-top:2px">α 0.55</div>
          </div>
        
          <div style="flex:1;height:100%;background:rgba(255,255,255,0.32);backdrop-filter:blur(20px) saturate(1.2);-webkit-backdrop-filter:blur(20px) saturate(1.2);border-radius:14px;box-shadow:inset 0 0 0 1px rgba(255,255,255,0.45);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:#FFFFFF;font:600 13px/1.2 var(--font-text)">
            light
            <div style="font:500 10px/1.4 var(--font-mono);opacity:0.75;margin-top:2px">α 0.32</div>
          </div>
        
          <div style="flex:1;height:100%;background:rgba(255,255,255,0.18);backdrop-filter:blur(20px) saturate(1.2);-webkit-backdrop-filter:blur(20px) saturate(1.2);border-radius:14px;box-shadow:inset 0 0 0 1px rgba(255,255,255,0.45);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:#FFFFFF;font:600 13px/1.2 var(--font-text)">
            tint
            <div style="font:500 10px/1.4 var(--font-mono);opacity:0.75;margin-top:2px">α 0.18</div>
          </div>
        
      </div>
    </div></div></body>
</html>
