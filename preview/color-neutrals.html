<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Color · Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: var(--font-text); color: var(--fg-2); }
  .card-frame { box-sizing: border-box; padding: 24px; min-height: 180px; }
  .row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .label { font: 600 11px/1 var(--font-text); letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); }
  .hex   { font: 500 12px/1 var(--font-mono, ui-monospace); color: var(--fg-3); }
  .name  { font: 600 13px/1.2 var(--font-text); color: var(--fg-1); }
  .desc  { font: 400 13px/1.4 var(--font-text); color: var(--fg-3); }
  
</style>
</head>
<body><div class="card-frame">
    <div class="row" style="gap:8px">
      
        <div class="col" style="flex:1">
          <div style="height:92px;border-radius:10px;background:#FFFFFF;box-shadow:inset 0 0 0 1px #E4E9F2"></div>
          <div class="name">base-0</div>
          <div class="hex">#FFFFFF</div>
          <div class="desc">surface</div>
        </div>
      
        <div class="col" style="flex:1">
          <div style="height:92px;border-radius:10px;background:#FAFBFE;box-shadow:none"></div>
          <div class="name">base-50</div>
          <div class="hex">#FAFBFE</div>
          <div class="desc">page</div>
        </div>
      
        <div class="col" style="flex:1">
          <div style="height:92px;border-radius:10px;background:#F1F4FA;box-shadow:none"></div>
          <div class="name">base-100</div>
          <div class="hex">#F1F4FA</div>
          <div class="desc">subtle</div>
        </div>
      
        <div class="col" style="flex:1">
          <div style="height:92px;border-radius:10px;background:#E4E9F2;box-shadow:none"></div>
          <div class="name">base-200</div>
          <div class="hex">#E4E9F2</div>
          <div class="desc">divider</div>
        </div>
      
        <div class="col" style="flex:1">
          <div style="height:92px;border-radius:10px;background:#C9D2E1;box-shadow:none"></div>
          <div class="name">base-300</div>
          <div class="hex">#C9D2E1</div>
          <div class="desc">disabled</div>
        </div>
      
        <div class="col" style="flex:1">
          <div style="height:92px;border-radius:10px;background:#99A4B8;box-shadow:none"></div>
          <div class="name">base-400</div>
          <div class="hex">#99A4B8</div>
          <div class="desc">placeholder</div>
        </div>
      
        <div class="col" style="flex:1">
          <div style="height:92px;border-radius:10px;background:#6B7689;box-shadow:none"></div>
          <div class="name">base-500</div>
          <div class="hex">#6B7689</div>
          <div class="desc">fg-3</div>
        </div>
      
        <div class="col" style="flex:1">
          <div style="height:92px;border-radius:10px;background:#2E3647;box-shadow:none"></div>
          <div class="name">base-700</div>
          <div class="hex">#2E3647</div>
          <div class="desc">fg-2</div>
        </div>
      
        <div class="col" style="flex:1">
          <div style="height:92px;border-radius:10px;background:#11151F;box-shadow:none"></div>
          <div class="name">base-900</div>
          <div class="hex">#11151F</div>
          <div class="desc">fg-1</div>
        </div>
      
    </div></div></body>
</html>
