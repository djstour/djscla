<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Components · Filter Chips</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@0.474.0/dist/umd/lucide.js"></script>
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: var(--font-text); color: var(--fg-2); }
  .card-frame { box-sizing: border-box; padding: 20px; min-height: 200px; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; gap: 6px; }
  .label { font: 600 11px/1 var(--font-text); letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 6px; }
  .desc  { font: 400 12px/1.4 var(--font-text); color: var(--fg-3); }

  /* Buttons */
  .btn { font-family: var(--font-text); font-weight: 600; font-size: 14px; line-height: 1; cursor: pointer; border: 0; display: inline-flex; align-items: center; gap: 8px; transition: transform var(--dur-fast) var(--ease-out), box-shadow var(--dur-fast) var(--ease-out), filter var(--dur-fast) var(--ease-out); }
  .btn--md { height: 44px; padding: 0 20px; border-radius: 999px; }
  .btn--sm { height: 36px; padding: 0 16px; border-radius: 999px; font-size: 13px; }
  .btn--lg { height: 52px; padding: 0 26px; border-radius: 999px; font-size: 15px; }
  .btn--primary { background: var(--gradient-aurora); color: #062F2A; box-shadow: var(--shadow-glow-aurora); }
  .btn--primary:hover { filter: brightness(1.06); }
  .btn--sun { background: var(--gradient-sun); color: #fff; box-shadow: var(--shadow-glow-sun); }
  .btn--coral { background: var(--coral); color: #fff; box-shadow: 0 8px 22px rgba(255,90,106,0.35); }
  .btn--glass { background: var(--glass-strong); color: var(--fg-1); backdrop-filter: blur(20px); box-shadow: var(--shadow-2), var(--ring-glass); }
  .btn--ghost { background: transparent; color: var(--fg-1); box-shadow: inset 0 0 0 1px var(--base-300); }
  .btn--ghost:hover { background: var(--base-100); }
  .btn:active { transform: scale(0.98); }
  .btn [data-lucide] { width: 16px; height: 16px; }
</style>
</head>
<body><div class="card-frame">
    <div class="col" style="gap:14px">
      <div class="row">
        
          <span style="display:inline-flex;align-items:center;gap:6px;height:36px;padding:0 14px;border-radius:999px;font:600 13px/1 var(--font-text);background:#C6FF3F;color:#11151F;box-shadow:var(--shadow-2)"><i data-lucide="check" style="width:14px;height:14px"></i>All suppliers · 全部</span>
        
          <span style="display:inline-flex;align-items:center;gap:6px;height:36px;padding:0 14px;border-radius:999px;font:600 13px/1 var(--font-text);background:#fff;color:var(--fg-2);box-shadow:inset 0 0 0 1px var(--base-200)">Arctic Adventures</span>
        
          <span style="display:inline-flex;align-items:center;gap:6px;height:36px;padding:0 14px;border-radius:999px;font:600 13px/1 var(--font-text);background:#fff;color:var(--fg-2);box-shadow:inset 0 0 0 1px var(--base-200)">Reykjavík Excursions</span>
        
          <span style="display:inline-flex;align-items:center;gap:6px;height:36px;padding:0 14px;border-radius:999px;font:600 13px/1 var(--font-text);background:#fff;color:var(--fg-2);box-shadow:inset 0 0 0 1px var(--base-200)">Iceland ProTravel</span>
        
          <span style="display:inline-flex;align-items:center;gap:6px;height:36px;padding:0 14px;border-radius:999px;font:600 13px/1 var(--font-text);background:#fff;color:var(--fg-2);box-shadow:inset 0 0 0 1px var(--base-200)">Troll Expeditions</span>
        
          <span style="display:inline-flex;align-items:center;gap:6px;height:36px;padding:0 14px;border-radius:999px;font:600 13px/1 var(--font-text);background:#fff;color:var(--fg-2);box-shadow:inset 0 0 0 1px var(--base-200)">Nicetravel</span>
        
          <span style="display:inline-flex;align-items:center;gap:6px;height:36px;padding:0 14px;border-radius:999px;font:600 13px/1 var(--font-text);background:#fff;color:var(--fg-2);box-shadow:inset 0 0 0 1px var(--base-200)">Mountaineers of Iceland</span>
        
      </div>
      <div class="row">
        
          <span style="display:inline-flex;align-items:center;gap:6px;height:36px;padding:0 14px;border-radius:999px;background:var(--glass-strong);backdrop-filter:blur(12px);box-shadow:inset 0 0 0 1px rgba(255,255,255,0.7),var(--shadow-1);color:var(--fg-1);font:600 13px/1 var(--font-text)"><i data-lucide="car-front" style="width:14px;height:14px"></i>Self-drive</span>
        
          <span style="display:inline-flex;align-items:center;gap:6px;height:36px;padding:0 14px;border-radius:999px;background:var(--glass-strong);backdrop-filter:blur(12px);box-shadow:inset 0 0 0 1px rgba(255,255,255,0.7),var(--shadow-1);color:var(--fg-1);font:600 13px/1 var(--font-text)"><i data-lucide="sparkles" style="width:14px;height:14px"></i>Northern Lights</span>
        
          <span style="display:inline-flex;align-items:center;gap:6px;height:36px;padding:0 14px;border-radius:999px;background:var(--glass-strong);backdrop-filter:blur(12px);box-shadow:inset 0 0 0 1px rgba(255,255,255,0.7),var(--shadow-1);color:var(--fg-1);font:600 13px/1 var(--font-text)"><i data-lucide="mountain-snow" style="width:14px;height:14px"></i>Glacier hike</span>
        
          <span style="display:inline-flex;align-items:center;gap:6px;height:36px;padding:0 14px;border-radius:999px;background:var(--glass-strong);backdrop-filter:blur(12px);box-shadow:inset 0 0 0 1px rgba(255,255,255,0.7),var(--shadow-1);color:var(--fg-1);font:600 13px/1 var(--font-text)"><i data-lucide="droplets" style="width:14px;height:14px"></i>Hot spring</span>
        
          <span style="display:inline-flex;align-items:center;gap:6px;height:36px;padding:0 14px;border-radius:999px;background:var(--glass-strong);backdrop-filter:blur(12px);box-shadow:inset 0 0 0 1px rgba(255,255,255,0.7),var(--shadow-1);color:var(--fg-1);font:600 13px/1 var(--font-text)"><i data-lucide="sun" style="width:14px;height:14px"></i>Day trip</span>
        
      </div>
      <span class="desc">Active fill — Neon Lime · #C6FF3F · charcoal text</span>
    </div></div><script>lucide.createIcons();</script></body>
</html>
