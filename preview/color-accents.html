<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Color · Accents</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: var(--font-text); color: var(--fg-2); }
  .card-frame { box-sizing: border-box; padding: 24px; min-height: 170px; }
  .row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .label { font: 600 11px/1 var(--font-text); letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); }
  .hex   { font: 500 12px/1 var(--font-mono, ui-monospace); color: var(--fg-3); }
  .name  { font: 600 13px/1.2 var(--font-text); color: var(--fg-1); }
  .desc  { font: 400 13px/1.4 var(--font-text); color: var(--fg-3); }
  
</style>
</head>
<body><div class="card-frame">
    <div class="row" style="align-items:stretch">
      <div class="col" style="flex:1">
        <div style="height:90px;border-radius:14px;background:#FF5A6A;display:flex;align-items:flex-end;padding:12px;color:#fff;font:600 14px/1 var(--font-text);box-shadow:0 8px 22px rgba(255,90,106,0.35)">Coral</div>
        <div class="row" style="gap:6px"><div class="hex">#FF5A6A</div><div class="desc">· interactive / save</div></div>
      </div>
      <div class="col" style="flex:1">
        <div style="height:90px;border-radius:14px;background:#C6FF3F;display:flex;align-items:flex-end;padding:12px;color:#11151F;font:600 14px/1 var(--font-text);box-shadow:0 8px 22px rgba(198,255,63,0.45)">Neon Lime</div>
        <div class="row" style="gap:6px"><div class="hex">#C6FF3F</div><div class="desc">· filter / badge</div></div>
      </div>
      <div class="col" style="flex:1">
        <div style="height:90px;border-radius:14px;background:#E63E50;display:flex;align-items:flex-end;padding:12px;color:#fff;font:600 14px/1 var(--font-text)">Coral · press</div>
        <div class="row" style="gap:6px"><div class="hex">#E63E50</div><div class="desc">· pressed state</div></div>
      </div>
      <div class="col" style="flex:1">
        <div style="height:90px;border-radius:14px;background:#9EE800;display:flex;align-items:flex-end;padding:12px;color:#11151F;font:600 14px/1 var(--font-text)">Lime · deep</div>
        <div class="row" style="gap:6px"><div class="hex">#9EE800</div><div class="desc">· lime-on-light</div></div>
      </div>
    </div></div></body>
</html>
