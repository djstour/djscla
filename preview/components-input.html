<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Components · Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@0.474.0/dist/umd/lucide.js"></script>
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: var(--font-text); color: var(--fg-2); }
  .card-frame { box-sizing: border-box; padding: 20px; min-height: 220px; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; gap: 6px; }
  .label { font: 600 11px/1 var(--font-text); letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 6px; }
  .desc  { font: 400 12px/1.4 var(--font-text); color: var(--fg-3); }

  /* Buttons */
  .btn { font-family: var(--font-text); font-weight: 600; font-size: 14px; line-height: 1; cursor: pointer; border: 0; display: inline-flex; align-items: center; gap: 8px; transition: transform var(--dur-fast) var(--ease-out), box-shadow var(--dur-fast) var(--ease-out), filter var(--dur-fast) var(--ease-out); }
  .btn--md { height: 44px; padding: 0 20px; border-radius: 999px; }
  .btn--sm { height: 36px; padding: 0 16px; border-radius: 999px; font-size: 13px; }
  .btn--lg { height: 52px; padding: 0 26px; border-radius: 999px; font-size: 15px; }
  .btn--primary { background: var(--gradient-aurora); color: #062F2A; box-shadow: var(--shadow-glow-aurora); }
  .btn--primary:hover { filter: brightness(1.06); }
  .btn--sun { background: var(--gradient-sun); color: #fff; box-shadow: var(--shadow-glow-sun); }
  .btn--coral { background: var(--coral); color: #fff; box-shadow: 0 8px 22px rgba(255,90,106,0.35); }
  .btn--glass { background: var(--glass-strong); color: var(--fg-1); backdrop-filter: blur(20px); box-shadow: var(--shadow-2), var(--ring-glass); }
  .btn--ghost { background: transparent; color: var(--fg-1); box-shadow: inset 0 0 0 1px var(--base-300); }
  .btn--ghost:hover { background: var(--base-100); }
  .btn:active { transform: scale(0.98); }
  .btn [data-lucide] { width: 16px; height: 16px; }
</style>
</head>
<body><div class="card-frame">
    <div class="col" style="gap:14px;max-width:600px">
      <label class="col" style="gap:6px">
        <span class="label" style="margin:0">Departure city</span>
        <div style="height:48px;padding:0 16px;display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--base-200);border-radius:14px;box-shadow:var(--shadow-1)">
          <i data-lucide="search" style="width:18px;height:18px;color:var(--fg-3)"></i>
          <input style="flex:1;border:0;outline:0;font:500 15px/1 var(--font-text);color:var(--fg-1);background:transparent" value="Reykjavík (KEF)">
          <i data-lucide="chevron-down" style="width:18px;height:18px;color:var(--fg-3)"></i>
        </div>
      </label>
      <div class="row" style="gap:12px;align-items:flex-end">
        <label class="col" style="gap:6px;flex:1">
          <span class="label" style="margin:0">Dates</span>
          <div style="height:48px;padding:0 16px;display:flex;align-items:center;gap:10px;background:#fff;border:2px solid var(--aurora-cyan);border-radius:14px;box-shadow:0 0 0 3px rgba(0,213,255,0.22)">
            <i data-lucide="calendar" style="width:18px;height:18px;color:var(--fg-2)"></i>
            <span style="font:500 15px/1 var(--font-text);color:var(--fg-1)">12 → 19 Mar 2026</span>
          </div>
          <span class="desc" style="color:var(--aurora-deep)">Focused state · 3px cyan ring</span>
        </label>
        <label class="col" style="gap:6px;flex:1">
          <span class="label" style="margin:0">Travelers</span>
          <div style="height:48px;padding:0 16px;display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--base-200);border-radius:14px;box-shadow:var(--shadow-1)">
            <i data-lucide="users" style="width:18px;height:18px;color:var(--fg-3)"></i>
            <span style="font:500 15px/1 var(--font-text);color:var(--fg-1)">2 adults</span>
          </div>
        </label>
      </div>
    </div></div><script>lucide.createIcons();</script></body>
</html>
