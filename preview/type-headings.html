<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type · Headings</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: var(--font-text); color: var(--fg-2); }
  .card-frame { box-sizing: border-box; padding: 24px; min-height: 260px; }
  .row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .label { font: 600 11px/1 var(--font-text); letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); }
  .hex   { font: 500 12px/1 var(--font-mono, ui-monospace); color: var(--fg-3); }
  .name  { font: 600 13px/1.2 var(--font-text); color: var(--fg-1); }
  .desc  { font: 400 13px/1.4 var(--font-text); color: var(--fg-3); }
  
</style>
</head>
<body><div class="card-frame">
    <div class="col" style="gap:8px">
      <div style="font:600 40px/1.08 var(--font-display);letter-spacing:-0.02em;color:var(--fg-1)">H1 · Plan your itinerary</div>
      <div style="font:600 32px/1.1 var(--font-display);letter-spacing:-0.02em;color:var(--fg-1)">H2 · Featured tours</div>
      <div style="font:600 24px/1.22 var(--font-display);letter-spacing:-0.015em;color:var(--fg-1)">H3 · Day 3 — Vík to Höfn</div>
      <div style="font:600 20px/1.22 var(--font-display);letter-spacing:-0.01em;color:var(--fg-1)">H4 · Trip summary</div>
      <div class="desc" style="margin-top:6px">40 / 32 / 24 / 20 px — Sora 600 — tracking −0.02em → −0.01em — text-wrap: balance</div>
    </div></div></body>
</html>
