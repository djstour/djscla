<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Components · Tour Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@0.474.0/dist/umd/lucide.js"></script>
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: var(--font-text); color: var(--fg-2); }
  .card-frame { box-sizing: border-box; padding: 20px; min-height: 360px; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; gap: 6px; }
  .label { font: 600 11px/1 var(--font-text); letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 6px; }
  .desc  { font: 400 12px/1.4 var(--font-text); color: var(--fg-3); }

  /* Buttons */
  .btn { font-family: var(--font-text); font-weight: 600; font-size: 14px; line-height: 1; cursor: pointer; border: 0; display: inline-flex; align-items: center; gap: 8px; transition: transform var(--dur-fast) var(--ease-out), box-shadow var(--dur-fast) var(--ease-out), filter var(--dur-fast) var(--ease-out); }
  .btn--md { height: 44px; padding: 0 20px; border-radius: 999px; }
  .btn--sm { height: 36px; padding: 0 16px; border-radius: 999px; font-size: 13px; }
  .btn--lg { height: 52px; padding: 0 26px; border-radius: 999px; font-size: 15px; }
  .btn--primary { background: var(--gradient-aurora); color: #062F2A; box-shadow: var(--shadow-glow-aurora); }
  .btn--primary:hover { filter: brightness(1.06); }
  .btn--sun { background: var(--gradient-sun); color: #fff; box-shadow: var(--shadow-glow-sun); }
  .btn--coral { background: var(--coral); color: #fff; box-shadow: 0 8px 22px rgba(255,90,106,0.35); }
  .btn--glass { background: var(--glass-strong); color: var(--fg-1); backdrop-filter: blur(20px); box-shadow: var(--shadow-2), var(--ring-glass); }
  .btn--ghost { background: transparent; color: var(--fg-1); box-shadow: inset 0 0 0 1px var(--base-300); }
  .btn--ghost:hover { background: var(--base-100); }
  .btn:active { transform: scale(0.98); }
  .btn [data-lucide] { width: 16px; height: 16px; }
</style>
</head>
<body><div class="card-frame">
    <div style="background:var(--gradient-mist);margin:-20px;padding:22px;min-height:360px">
      <div style="display:flex;gap:18px;align-items:stretch;max-width:660px">
        <div class="glass" style="flex:1;padding:0;overflow:hidden;border-radius:24px;display:flex;flex-direction:column">
          <div style="height:160px;background:linear-gradient(135deg,#0B1A4E 0%,#1E3D7A 40%,#37C7DA 75%,#A8F0FF 100%);position:relative;overflow:hidden">
            <span style="position:absolute;top:12px;left:12px;background:#C6FF3F;color:#11151F;font:700 11px/1 var(--font-text);letter-spacing:0.08em;text-transform:uppercase;padding:6px 10px;border-radius:999px">Top pick</span>
            <span style="position:absolute;top:12px;right:12px;background:rgba(255,255,255,0.85);backdrop-filter:blur(8px);width:32px;height:32px;border-radius:999px;display:flex;align-items:center;justify-content:center"><i data-lucide="heart" style="width:16px;height:16px;color:var(--fg-1)"></i></span>
            <span style="position:absolute;bottom:12px;left:12px;color:#fff;font:500 11px/1 var(--font-text);letter-spacing:0.12em;text-transform:uppercase">Jökulsárlón · 冰河湖</span>
          </div>
          <div style="padding:16px 18px;display:flex;flex-direction:column;gap:8px">
            <div style="font:600 18px/1.25 var(--font-display);color:var(--fg-1);letter-spacing:-0.01em">South Coast & glacier lagoon · 南岸全日</div>
            <div class="row" style="gap:14px;color:var(--fg-3);font:500 13px/1 var(--font-text)">
              <span class="row" style="gap:4px"><i data-lucide="clock" style="width:14px;height:14px"></i>11 hr</span>
              <span class="row" style="gap:4px"><i data-lucide="car-front" style="width:14px;height:14px"></i>Self-drive</span>
              <span class="row" style="gap:4px"><i data-lucide="star" style="width:14px;height:14px;color:#FFB347"></i>4.8 · 1,204</span>
            </div>
            <div class="row" style="justify-content:space-between;align-items:flex-end;margin-top:6px">
              <div class="col" style="gap:2px">
                <span class="desc">from</span>
                <span style="font:700 22px/1 var(--font-display);color:var(--fg-1);letter-spacing:-0.02em">NT$ 4,280</span>
              </div>
              <button class="btn btn--primary btn--sm">Add to trip <i data-lucide="plus"></i></button>
            </div>
          </div>
        </div>
        <div class="col" style="width:200px;gap:8px;justify-content:center">
          <div class="desc" style="color:var(--fg-2)">Tour card anatomy: 24px radius, 16:9 photo with overlay badges, 16/18px padding, gradient CTA, charcoal price.</div>
        </div>
      </div>
    </div></div><script>lucide.createIcons();</script></body>
</html>
