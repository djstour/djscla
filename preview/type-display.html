<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type · Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: var(--font-text); color: var(--fg-2); }
  .card-frame { box-sizing: border-box; padding: 24px; min-height: 230px; }
  .row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .label { font: 600 11px/1 var(--font-text); letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); }
  .hex   { font: 500 12px/1 var(--font-mono, ui-monospace); color: var(--fg-3); }
  .name  { font: 600 13px/1.2 var(--font-text); color: var(--fg-1); }
  .desc  { font: 400 13px/1.4 var(--font-text); color: var(--fg-3); }
  
</style>
</head>
<body><div class="card-frame">
    <div class="col" style="gap:10px">
      <div style="font:700 76px/1 var(--font-display);letter-spacing:-0.03em;color:var(--fg-1)">Aurora awaits.</div>
      <div style="font:700 48px/1.05 var(--font-display);letter-spacing:-0.02em;color:var(--fg-1)">Iceland, your way</div>
      <div class="row" style="gap:16px;margin-top:4px">
        <span class="desc"><b style="color:var(--fg-1)">Display-1</b> · clamp(56, 7vw, 96)</span>
        <span class="desc"><b style="color:var(--fg-1)">Display-2</b> · clamp(40, 5vw, 64)</span>
        <span class="desc">Sora 700 · -0.03em</span>
      </div>
    </div></div></body>
</html>
