<!doctype html>
<html lang="zh-Hans">
<head>
<meta charset="utf-8">
<title>Type · 简体中文</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: var(--font-text); color: var(--fg-2); }
  .card-frame { box-sizing: border-box; padding: 24px; min-height: 240px; }
  .desc { font: 400 13px/1.4 var(--font-text); color: var(--fg-3); }
</style>
</head>
<body>
<div class="card-frame">
  <div style="display:flex;flex-direction:column;gap:8px">
    <div style="font:700 40px/1.1 var(--font-han-display);letter-spacing:0;color:var(--fg-1)">为你而转的冰岛旅程</div>
    <div style="font:500 24px/1.3 var(--font-han-display);color:var(--fg-1)">行程规划 · 当地向导 · 无缝结账</div>
    <div style="font:400 16px/1.65 var(--font-han-display);color:var(--fg-2)">一次规划，多家供应商无缝整合。从黄金圈到南岸冰川，800+ 当地向导任你挑选。</div>
    <div class="desc" style="margin-top:4px">Noto Sans SC · 700 / 500 / 400 · auto-selected via <code style="font-family:var(--font-mono);color:var(--fg-2)">:lang(zh-Hans)</code></div>
  </div>
</div>
</body>
</html>
