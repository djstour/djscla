<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Components · Map Markers</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@0.474.0/dist/umd/lucide.js"></script>
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: var(--font-text); color: var(--fg-2); }
  .card-frame { box-sizing: border-box; padding: 20px; min-height: 220px; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; gap: 6px; }
  .label { font: 600 11px/1 var(--font-text); letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 6px; }
  .desc  { font: 400 12px/1.4 var(--font-text); color: var(--fg-3); }

  /* Buttons */
  .btn { font-family: var(--font-text); font-weight: 600; font-size: 14px; line-height: 1; cursor: pointer; border: 0; display: inline-flex; align-items: center; gap: 8px; transition: transform var(--dur-fast) var(--ease-out), box-shadow var(--dur-fast) var(--ease-out), filter var(--dur-fast) var(--ease-out); }
  .btn--md { height: 44px; padding: 0 20px; border-radius: 999px; }
  .btn--sm { height: 36px; padding: 0 16px; border-radius: 999px; font-size: 13px; }
  .btn--lg { height: 52px; padding: 0 26px; border-radius: 999px; font-size: 15px; }
  .btn--primary { background: var(--gradient-aurora); color: #062F2A; box-shadow: var(--shadow-glow-aurora); }
  .btn--primary:hover { filter: brightness(1.06); }
  .btn--sun { background: var(--gradient-sun); color: #fff; box-shadow: var(--shadow-glow-sun); }
  .btn--coral { background: var(--coral); color: #fff; box-shadow: 0 8px 22px rgba(255,90,106,0.35); }
  .btn--glass { background: var(--glass-strong); color: var(--fg-1); backdrop-filter: blur(20px); box-shadow: var(--shadow-2), var(--ring-glass); }
  .btn--ghost { background: transparent; color: var(--fg-1); box-shadow: inset 0 0 0 1px var(--base-300); }
  .btn--ghost:hover { background: var(--base-100); }
  .btn:active { transform: scale(0.98); }
  .btn [data-lucide] { width: 16px; height: 16px; }
</style>
</head>
<body><div class="card-frame">
    <div style="position:relative;background:linear-gradient(135deg,#DBF7FF 0%,#E8E2FF 100%);margin:-20px;padding:24px;min-height:220px;overflow:hidden">
      <!-- fake map grid -->
      <svg viewBox="0 0 600 200" style="position:absolute;inset:0;width:100%;height:100%;opacity:0.3" preserveAspectRatio="none">
        <path d="M0 60 Q 100 30 200 80 T 400 70 T 600 100" stroke="#6B7689" stroke-width="1.5" fill="none" stroke-dasharray="4 6"/>
        <path d="M0 140 Q 150 110 300 160 T 600 150" stroke="#6B7689" stroke-width="1.5" fill="none"/>
      </svg>
      <div class="row" style="gap:36px;position:relative;justify-content:center;padding-top:14px">
        
          <div class="col" style="align-items:center;gap:8px">
            <div style="position:relative;width:48px;height:60px">
              <div style="width:48px;height:48px;border-radius:999px;background:linear-gradient(135deg,#2EFFB8,#00D5FF);box-shadow:0 8px 24px rgba(0,0,0,0.18),inset 0 0 0 3px #fff;display:flex;align-items:center;justify-content:center;color:#fff;font:700 18px/1 var(--font-display)">1</div>
              <div style="position:absolute;left:50%;bottom:0;transform:translate(-50%,40%) rotate(45deg);width:14px;height:14px;background:linear-gradient(135deg,#2EFFB8,#00D5FF);border-radius:0 0 4px 0;box-shadow:inset 0 0 0 2px #fff"></div>
            </div>
            <span style="font:600 12px/1 var(--font-display);color:var(--fg-1);background:rgba(255,255,255,0.85);backdrop-filter:blur(8px);padding:6px 10px;border-radius:999px;box-shadow:var(--shadow-1)">Geysir</span>
          </div>
        
          <div class="col" style="align-items:center;gap:8px">
            <div style="position:relative;width:48px;height:60px">
              <div style="width:48px;height:48px;border-radius:999px;background:linear-gradient(135deg,#00D5FF,#6B2FE6);box-shadow:0 8px 24px rgba(0,0,0,0.18),inset 0 0 0 3px #fff;display:flex;align-items:center;justify-content:center;color:#fff;font:700 18px/1 var(--font-display)">2</div>
              <div style="position:absolute;left:50%;bottom:0;transform:translate(-50%,40%) rotate(45deg);width:14px;height:14px;background:linear-gradient(135deg,#00D5FF,#6B2FE6);border-radius:0 0 4px 0;box-shadow:inset 0 0 0 2px #fff"></div>
            </div>
            <span style="font:600 12px/1 var(--font-display);color:var(--fg-1);background:rgba(255,255,255,0.85);backdrop-filter:blur(8px);padding:6px 10px;border-radius:999px;box-shadow:var(--shadow-1)">Vík</span>
          </div>
        
          <div class="col" style="align-items:center;gap:8px">
            <div style="position:relative;width:48px;height:60px">
              <div style="width:48px;height:48px;border-radius:999px;background:linear-gradient(135deg,#FF7A2E,#B331E2);box-shadow:0 8px 24px rgba(0,0,0,0.18),inset 0 0 0 3px #fff;display:flex;align-items:center;justify-content:center;color:#fff;font:700 18px/1 var(--font-display)">3</div>
              <div style="position:absolute;left:50%;bottom:0;transform:translate(-50%,40%) rotate(45deg);width:14px;height:14px;background:linear-gradient(135deg,#FF7A2E,#B331E2);border-radius:0 0 4px 0;box-shadow:inset 0 0 0 2px #fff"></div>
            </div>
            <span style="font:600 12px/1 var(--font-display);color:var(--fg-1);background:rgba(255,255,255,0.85);backdrop-filter:blur(8px);padding:6px 10px;border-radius:999px;box-shadow:var(--shadow-1)">Höfn</span>
          </div>
        
          <div class="col" style="align-items:center;gap:8px">
            <div style="position:relative;width:48px;height:60px">
              <div style="width:48px;height:48px;border-radius:999px;background:linear-gradient(135deg,#FF5A6A,#FF7A2E);box-shadow:0 8px 24px rgba(0,0,0,0.18),inset 0 0 0 3px #fff;display:flex;align-items:center;justify-content:center;color:#fff;font:700 18px/1 var(--font-display)">4</div>
              <div style="position:absolute;left:50%;bottom:0;transform:translate(-50%,40%) rotate(45deg);width:14px;height:14px;background:linear-gradient(135deg,#FF5A6A,#FF7A2E);border-radius:0 0 4px 0;box-shadow:inset 0 0 0 2px #fff"></div>
            </div>
            <span style="font:600 12px/1 var(--font-display);color:var(--fg-1);background:rgba(255,255,255,0.85);backdrop-filter:blur(8px);padding:6px 10px;border-radius:999px;box-shadow:var(--shadow-1)">Akureyri</span>
          </div>
        
      </div>
    </div></div><script>lucide.createIcons();</script></body>
</html>
