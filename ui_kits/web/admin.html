<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">

<base href="/ui_kits/web/">
<title>DJS Tour · Admin Console</title>
<link rel="icon" href="../../assets/logo-mark.svg">
<link rel="stylesheet" href="../../colors_and_type.css?v=site1">
<script>
(function () {
  try {
    var t = localStorage.getItem('auralis:siteTheme:v1')
      || sessionStorage.getItem('auralis:siteTheme:v1')
      || sessionStorage.getItem('auralis:heroTheme:v3');
    if (t === 'aurora' || t === 'mist' || t === 'sun') {
      document.documentElement.setAttribute('data-site-theme', t);
    }
  } catch (e) { /* ignore */ }
})();
</script>
<link rel="stylesheet" href="responsive.css">
<link rel="stylesheet" href="admin.css">

  button { font-family: var(--font-text); }
  input, select, textarea { font-family: var(--font-text); }
