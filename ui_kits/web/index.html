<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<!-- Lets / and /index.html rewrite here while relative assets still resolve. -->
<base href="/ui_kits/web/">
<title>DJS Tour 獨角獸旅遊</title>
<link rel="icon" href="../../assets/logo-mark.svg">
<link rel="stylesheet" href="../../colors_and_type.css?v=site1">
<script>
(function () {
  try {
    var t = localStorage.getItem('auralis:siteTheme:v1')
      || sessionStorage.getItem('auralis:siteTheme:v1')
      || sessionStorage.getItem('auralis:heroTheme:v3');
    if (t === 'aurora' || t === 'mist' || t === 'sun') {
      document.documentElement.setAttribute('data-site-theme', t);
    }
  } catch (e) { /* ignore */ }
})();
</script>
<link rel="stylesheet" href="responsive.css">
<link rel="preconnect" href="https://bokun.s3.amazonaws.com" crossorigin>
<link rel="dns-prefetch" href="https://bokun.s3.amazonaws.com">

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.474.0/dist/umd/lucide.js"></script>

<!-- Data layer — loaded before any Babel component scripts so the adapter
     is ready by the time React mounts. Plain JS (no JSX). -->
<script src="../../data/bokunTranslations.js"></script>
<script src="../../data/bokunSectionLabels.js"></script>
<script src="../../lib/paxCategories.js"></script>
<script src="../../data/bokunAdapter.js"></script>

<style>
  html, body { margin: 0; padding: 0; background: var(--bg-page); font-family: var(--font-text); color: var(--fg-2); overflow-x: hidden; }
  *, *::before, *::after { box-sizing: border-box; }
  button { font-family: var(--font-text); }
  input { font-family: var(--font-text); }
  ::selection { background: var(--brand-selection); color: var(--fg-1); }
</style>
</head>
<body data-screen-label="DJS Tour 獨角獸旅遊">
<div id="root"></div>

<script src="/lib/vendorHtmlLinks.js"></script>
<script type="text/babel" data-presets="react" src="components/_shared.jsx"></script>
<script type="text/babel" data-presets="react" src="components/Nav.jsx"></script>
<script type="text/babel" data-presets="react" src="components/DateRangePicker.jsx"></script>
<script type="text/babel" data-presets="react" src="components/MonthAvailabilityCalendar.jsx"></script>
<script type="text/babel" data-presets="react" src="components/Hero.jsx"></script>
<script type="text/babel" data-presets="react" src="components/TourCard.jsx"></script>
<script type="text/babel" data-presets="react" src="components/SearchOverlay.jsx"></script>
<script type="text/babel" data-presets="react" src="components/ActivityDetail.jsx"></script>
<script type="text/babel" data-presets="react" src="components/SupplierFilter.jsx"></script>
<script type="text/babel" data-presets="react" src="components/TripPanel.jsx"></script>
<script type="text/babel" data-presets="react" src="components/Checkout.jsx"></script>
<script type="text/babel" data-presets="react" src="components/Footer.jsx"></script>
<script type="text/babel" data-presets="react" src="components/App.jsx"></script>
<script type="text/babel" data-presets="react">
  // Mount once all components are registered. Because Babel scripts load
  // sequentially, App.jsx runs last and registers AuralisApp on window.
  ReactDOM.createRoot(document.getElementById('root')).render(<window.AuralisApp />);
</script>

</body>
</html>
